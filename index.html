<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dual Note App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* Page container */
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    /* Top bar inside the Safe Note for the internal Clear button */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0.8rem 1.2rem;
      background-color: rgba(15, 23, 42, 0.95);
      z-index: 10;
      flex-shrink: 0;
    }

    /* Clear Button inside the Note */
    .inner-clear-btn {
      background-color: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .inner-clear-btn:active {
      opacity: 0.8;
    }

    /* Textarea base styles */
    textarea {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      padding: 1.5rem;
      line-height: 1.5;
      background-color: transparent;
      color: inherit;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    textarea::placeholder {
      color: #475569;
    }

    /* WIPE NOTE: LARGE TEXT & FORCED UPPERCASE */
    #wipe-note {
      font-size: 1.5rem;
      line-height: 1.6;
      padding: 2rem;
      text-transform: uppercase;
    }

    /* SAFE NOTE: SMALLER, COMPACT TEXT */
    #safe-note {
      font-size: 1rem;
      line-height: 1.5;
    }

    /* TRUE OVERLAY: FIXED DRAGGABLE FLOATING BUTTON */
    #floating-btn {
      position: fixed;
      top: 25px;
      right: 25px;
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background-color: #3b82f6;
      color: white;
      border: 3px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
      cursor: grab;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      transition: background-color 0.2s ease;
    }

    #floating-btn:active {
      cursor: grabbing;
      transform: scale(0.95);
    }

    #floating-btn svg {
      width: 30px;
      height: 30px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- PAGE 1: WIPE NOTE (Tap anywhere to clear, ALL CAPS) -->
  <div id="wipe-page" class="page">
    <textarea id="wipe-note" placeholder="WIPE NOTE: TAP ANYWHERE TO INSTANTLY DELETE EVERYTHING."></textarea>
  </div>

  <!-- PAGE 2: SAFE NOTE (Normal note with internal clear button) -->
  <div id="safe-page" class="page hidden">
    <div class="top-bar">
      <button id="clear-btn" class="inner-clear-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        Clear Text
      </button>
    </div>
    <textarea id="safe-note" placeholder="SAFE NOTE: Type your notes here safely. Tap 'Clear Text' above to wipe, or press the big floating button to go back."></textarea>
  </div>

  <!-- OVERLAY BUTTON -->
  <div id="floating-btn" title="Switch Page">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
    </svg>
  </div>

  <script>
    const wipePage = document.getElementById('wipe-page');
    const safePage = document.getElementById('safe-page');
    const wipeNote = document.getElementById('wipe-note');
    const safeNote = document.getElementById('safe-note');
    const clearBtn = document.getElementById('clear-btn');
    const floatBtn = document.getElementById('floating-btn');

    let isSafeMode = false;
    let isDragging = false;
    let hasMoved = false;
    let startX, startY, initialLeft, initialTop;

    // Track scroll and selection state for Safe Note
    let savedScrollTop = 0;
    let savedSelectionStart = 0;
    let savedSelectionEnd = 0;

    // Force Wipe Note text to stay UPPERCASE as you type
    wipeNote.addEventListener('input', () => {
      const start = wipeNote.selectionStart;
      const end = wipeNote.selectionEnd;
      wipeNote.value = wipeNote.value.toUpperCase();
      wipeNote.setSelectionRange(start, end);
    });

    // Save scroll position as user scrolls in Safe Note
    safeNote.addEventListener('scroll', () => {
      if (isSafeMode) {
        savedScrollTop = safeNote.scrollTop;
      }
    });

    // Helper function to maintain keyboard focus on Wipe Note
    function focusAndShowKeyboard(element) {
      element.focus();
      const len = element.value.length;
      element.setSelectionRange(len, len);
    }

    // 1. Wipe Note: Tap anywhere on screen to clear
    window.addEventListener('pointerdown', (e) => {
      if (floatBtn.contains(e.target) || clearBtn.contains(e.target)) return;

      if (!isSafeMode && wipeNote.value !== '') {
        wipeNote.value = '';
        focusAndShowKeyboard(wipeNote);
      }
    });

    // 2. Clear Button inside the Safe Note page
    clearBtn.addEventListener('click', () => {
      safeNote.value = '';
      savedScrollTop = 0;
      safeNote.scrollTop = 0;
      safeNote.focus();
    });

    // 3. Switch between pages
    function switchPage() {
      isSafeMode = !isSafeMode;
      if (isSafeMode) {
        // Going TO Safe Note
        wipePage.classList.add('hidden');
        safePage.classList.remove('hidden');
        floatBtn.style.backgroundColor = '#10b981'; // Green on Safe Note
        
        // Remove active focus to hide keyboard by default on Safe Note
        safeNote.blur();

        // Restore exact scroll position and cursor location without triggering keyboard
        requestAnimationFrame(() => {
          safeNote.scrollTop = savedScrollTop;
          safeNote.setSelectionRange(savedSelectionStart, savedSelectionEnd);
        });
      } else {
        // Leaving Safe Note -> Save current scroll and selection positions
        savedScrollTop = safeNote.scrollTop;
        savedSelectionStart = safeNote.selectionStart;
        savedSelectionEnd = safeNote.selectionEnd;

        safePage.classList.add('hidden');
        wipePage.classList.remove('hidden');
        floatBtn.style.backgroundColor = '#3b82f6'; // Blue on Wipe Note
        
        // Auto-show keyboard for Wipe Note
        requestAnimationFrame(() => {
          focusAndShowKeyboard(wipeNote);
        });
      }
    }

    // 4. Draggable logic for Floating Button
    floatBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();

      isDragging = true;
      hasMoved = false;
      startX = e.clientX;
      startY = e.clientY;

      const rect = floatBtn.getBoundingClientRect();
      initialLeft = rect.left;
      initialTop = rect.top;

      floatBtn.setPointerCapture(e.pointerId);
    });

    floatBtn.addEventListener('pointermove', (e) => {
      if (!isDragging) return;

      const dx = e.clientX - startX;
      const dy = e.clientY - startY;

      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        hasMoved = true;
      }

      let newLeft = initialLeft + dx;
      let newTop = initialTop + dy;

      const viewportWidth = window.visualViewport ? window.visualViewport.width : window.innerWidth;
      const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;

      newLeft = Math.max(10, Math.min(viewportWidth - floatBtn.offsetWidth - 10, newLeft));
      newTop = Math.max(10, Math.min(viewportHeight - floatBtn.offsetHeight - 10, newTop));

      floatBtn.style.left = `${newLeft}px`;
      floatBtn.style.top = `${newTop}px`;
      floatBtn.style.right = 'auto';
    });

    floatBtn.addEventListener('pointerup', (e) => {
      if (!isDragging) return;
      isDragging = false;
      floatBtn.releasePointerCapture(e.pointerId);

      if (!hasMoved) {
        switchPage();
      }
    });

    // Handle soft keyboard resize/scroll locking using VisualViewport API
    if (window.visualViewport) {
      const repositionOnViewport = () => {
        const rect = floatBtn.getBoundingClientRect();
        const vw = window.visualViewport.width;
        const vh = window.visualViewport.height;

        let curLeft = rect.left;
        let curTop = rect.top;

        if (curLeft + floatBtn.offsetWidth > vw) {
          floatBtn.style.left = `${Math.max(10, vw - floatBtn.offsetWidth - 10)}px`;
        }
        if (curTop + floatBtn.offsetHeight > vh) {
          floatBtn.style.top = `${Math.max(10, vh - floatBtn.offsetHeight - 10)}px`;
        }
      };

      window.visualViewport.addEventListener('resize', repositionOnViewport);
      window.visualViewport.addEventListener('scroll', repositionOnViewport);
    }
  </script>
</body>
</html>
