<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dual Note App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    /* Page container */
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .hidden {
      display: none !important;
    }

    /* Top bar inside the Safe Note for the internal Clear button */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 1rem 1.5rem;
      background-color: rgba(15, 23, 42, 0.8);
    }

    /* Clear Button inside the Note */
    .inner-clear-btn {
      background-color: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .inner-clear-btn:active {
      opacity: 0.8;
    }

    /* Textarea area */
    textarea {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      padding: 2rem;
      font-size: 1.5rem;
      line-height: 1.6;
      background-color: transparent;
      color: inherit;
    }
    textarea::placeholder {
      color: #475569;
    }

    /* BIG ROUND FLOATING BUTTON */
    #floating-btn {
      position: absolute;
      top: 25px;
      right: 25px;
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background-color: #3b82f6;
      color: white;
      border: 3px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
      cursor: grab;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none; /* Smooth touch-dragging on mobile */
      transition: transform 0.1s ease, background-color 0.2s ease;
    }

    #floating-btn:active {
      cursor: grabbing;
      transform: scale(0.95);
    }

    /* Icon size inside the big button */
    #floating-btn svg {
      width: 30px;
      height: 30px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- PAGE 1: WIPE NOTE (Tap anywhere to clear) -->
  <div id="wipe-page" class="page">
    <textarea id="wipe-note" placeholder="WIPE NOTE: Tap anywhere on the screen to instantly delete everything."></textarea>
  </div>

  <!-- PAGE 2: SAFE NOTE (Normal note with internal clear button) -->
  <div id="safe-page" class="page hidden">
    <div class="top-bar">
      <button id="clear-btn" class="inner-clear-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        Clear Text
      </button>
    </div>
    <textarea id="safe-note" placeholder="SAFE NOTE: Type your notes here safely. Tap 'Clear Text' above to wipe, or press the big floating button to go back."></textarea>
  </div>

  <!-- BIG ROUND DRAGGABLE FLOATING BUTTON -->
  <div id="floating-btn" title="Switch Page">
    <!-- Navigation icon -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
    </svg>
  </div>

  <script>
    const wipePage = document.getElementById('wipe-page');
    const safePage = document.getElementById('safe-page');
    const wipeNote = document.getElementById('wipe-note');
    const safeNote = document.getElementById('safe-note');
    const clearBtn = document.getElementById('clear-btn');
    const floatBtn = document.getElementById('floating-btn');

    let isSafeMode = false;
    let isDragging = false;
    let hasMoved = false;
    let startX, startY, initialLeft, initialTop;

    // Helper function to force soft keyboard open on mobile browsers
    function focusAndShowKeyboard(element) {
      element.focus();
      // Setting selection range ensures focus triggers virtual keyboard popup on mobile Chrome
      const len = element.value.length;
      element.setSelectionRange(len, len);
    }

    // 1. Wipe Note: Tap anywhere on screen to clear
    window.addEventListener('pointerdown', (e) => {
      // Ignore taps on the floating button or the clear button
      if (floatBtn.contains(e.target) || clearBtn.contains(e.target)) return;

      if (!isSafeMode && wipeNote.value !== '') {
        wipeNote.value = '';
        focusAndShowKeyboard(wipeNote);
      }
    });

    // 2. Clear Button inside the Safe Note page
    clearBtn.addEventListener('click', () => {
      safeNote.value = '';
      focusAndShowKeyboard(safeNote);
    });

    // 3. Switch between pages with persistent focus
    function switchPage() {
      isSafeMode = !isSafeMode;
      if (isSafeMode) {
        wipePage.classList.add('hidden');
        safePage.classList.remove('hidden');
        floatBtn.style.backgroundColor = '#10b981'; // Green on Safe Note
        
        // Retain keyboard focus instantly
        requestAnimationFrame(() => {
          focusAndShowKeyboard(safeNote);
        });
      } else {
        safePage.classList.add('hidden');
        wipePage.classList.remove('hidden');
        floatBtn.style.backgroundColor = '#3b82f6'; // Blue on Wipe Note
        
        // Retain keyboard focus instantly when going back to Wipe Note
        requestAnimationFrame(() => {
          focusAndShowKeyboard(wipeNote);
        });
      }
    }

    // 4. Draggable logic for the big round floating button
    floatBtn.addEventListener('pointerdown', (e) => {
      // Prevent button press from removing text focus default behavior
      e.preventDefault();

      isDragging = true;
      hasMoved = false;
      startX = e.clientX;
      startY = e.clientY;

      const rect = floatBtn.getBoundingClientRect();
      initialLeft = rect.left;
      initialTop = rect.top;

      floatBtn.setPointerCapture(e.pointerId);
    });

    floatBtn.addEventListener('pointermove', (e) => {
      if (!isDragging) return;

      const dx = e.clientX - startX;
      const dy = e.clientY - startY;

      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        hasMoved = true;
      }

      let newLeft = initialLeft + dx;
      let newTop = initialTop + dy;

      // Keep within screen edges
      newLeft = Math.max(10, Math.min(window.innerWidth - floatBtn.offsetWidth - 10, newLeft));
      newTop = Math.max(10, Math.min(window.innerHeight - floatBtn.offsetHeight - 10, newTop));

      floatBtn.style.left = `${newLeft}px`;
      floatBtn.style.top = `${newTop}px`;
      floatBtn.style.right = 'auto';
    });

    floatBtn.addEventListener('pointerup', (e) => {
      if (!isDragging) return;
      isDragging = false;
      floatBtn.releasePointerCapture(e.pointerId);

      // If clicked/tapped without dragging, switch pages
      if (!hasMoved) {
        switchPage();
      }
    });
  </script>
</body>
</html>
